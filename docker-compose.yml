services:
  # ─── API Server ───
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nailio-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://glowup:${DB_PASSWORD}@postgres:5432/glowup
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── BullMQ Worker ───
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nailio-worker
    restart: unless-stopped
    command: ['node', 'dist/workers/main.worker.js']
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://glowup:${DB_PASSWORD}@postgres:5432/glowup
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - api
    networks:
      - internal

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: nailio-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=glowup
      - POSTGRES_USER=glowup
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glowup']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PgBouncer ───
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: nailio-pgbouncer
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://glowup:${DB_PASSWORD}@postgres:5432/glowup
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: nailio-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    container_name: nailio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    networks:
      - internal

  # ─── Nginx (reverse proxy + SSL) ───
  nginx:
    image: nginx:alpine
    container_name: nailio-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - internal
      - external

  # ─── Certbot (Let's Encrypt) ───
  certbot:
    image: certbot/certbot:latest
    container_name: nailio-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    profiles:
      - ssl

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
